<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중2 필수 영단어 OX 퀴즈</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .progress {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .word-box {
            background-color: #eef2f7;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .english-word {
            font-size: 36px;
            font-weight: bold;
            color: #1a73e8;
            margin: 0;
        }
        .meaning {
            font-size: 20px;
            color: #555;
            margin: 10px 0 0 0;
        }
        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .btn {
            font-size: 32px;
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
            font-weight: bold;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-o { background-color: #4caf50; }
        .btn-x { background-color: #f44336; }
        
        .result-message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            height: 25px;
        }
        .score-board {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        .restart-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .restart-btn:hover { background-color: #155cb4; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <h1>🇬🇧 중2 필수 영단어 OX 퀴즈 🇰🇷</h1>
    <div class="progress" id="progress">문제 1 / 5</div>
    
    <div class="word-box">
        <p class="english-word" id="word">improve</p>
        <p class="meaning" id="meaning">뜻: 향상시키다, 개선하다</p>
    </div>

    <div class="btn-container" id="action-buttons">
        <button class="btn btn-o" onclick="checkAnswer(true)">O</button>
        <button class="btn btn-x" onclick="checkAnswer(false)">X</button>
    </div>
    
    <div class="result-message" id="feedback"></div>
</div>

<script>
    // 중학교 2학년 수준의 단어 데이터 세트
    const quizData = [
        { word: "improve", meaning: "향상시키다, 개선하다", answer: true },
        { word: "accept", meaning: "거절하다, 거부하다", answer: false }, // 올바른 뜻: 수락하다, 받아들이다
        { word: "environment", meaning: "환경", answer: true },
        { word: "disappear", meaning: "나타나다, 등장하다", answer: false }, // 올바른 뜻: 사라지다
        { word: "creative", meaning: "창의적인", answer: true },
        { word: "encourage", meaning: "낙담시키다", answer: false }, // 올바른 뜻: 격려하다, 권장하다
        { word: "population", meaning: "인구, 주민", answer: true },
        { word: "reduce", meaning: "늘리다, 증가시키다", answer: false }, // 올바른 뜻: 줄이다, 감소시키다
        { word: "volunteer", meaning: "자원봉사자", answer: true },
        { word: "foreign", meaning: "국내의, 친숙한", answer: false } // 올바른 뜻: 외국의
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    // 게임 시작 시 문제를 랜덤하게 5개 추출
    function initGame() {
        const shuffled = [...quizData].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 5); // 5문제만 출제
        currentIndex = 0;
        score = 0;
        document.getElementById("feedback").innerText = "";
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex < currentQuestions.length) {
            document.getElementById("progress").innerText = `문제 ${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById("word").innerText = currentQuestions[currentIndex].word;
            document.getElementById("meaning").innerText = `뜻: ${currentQuestions[currentIndex].meaning}`;
            document.getElementById("action-buttons").style.display = "flex";
            document.getElementById("feedback").innerText = "";
        } else {
            showResult();
        }
    }

    function checkAnswer(userAnswer) {
        const correctAnswer = currentQuestions[currentIndex].answer;
        const feedbackEl = document.getElementById("feedback");
        
        if (userAnswer === correctAnswer) {
            feedbackEl.style.color = "#4caf50";
            feedbackEl.innerText = "정답입니다! 🎉";
            score++;
        } else {
            feedbackEl.style.color = "#f44336";
            feedbackEl.innerText = "틀렸습니다! 😢";
        }

        // 버튼을 잠시 안 보이게 해서 연타 방지 및 피드백 확인용 delay
        document.getElementById("action-buttons").style.display = "none";
        
        setTimeout(() => {
            currentIndex++;
            showQuestion();
        }, 1200);
    }

    function showResult() {
        const quizBox = document.getElementById("quiz-box");
        let evaluation = "";
        
        if(score === 5) evaluation = "🏆 완벽해요! 영어 마스터이시군요!";
        else if(score >= 3) evaluation = "👍 훌륭해요! 조금만 더 하면 만점!";
        else evaluation = "📚 단어장을 한 번 더 복습해볼까요?";

        quizBox.innerHTML = `
            <h1>퀴즈 종료!</h1>
            <div class="score-board">
                <p>당신의 점수는</p>
                <p style="font-size: 48px; color: #1a73e8; margin: 10px 0;">${score} / 5</p>
                <p>${evaluation}</p>
            </div>
            <button class="restart-btn" onclick="location.reload()">다시 도전하기</button>
        `;
    }

    // 웹사이트 로드 시 게임 시작
    window.onload = initGame;
</script>

</body>
</html>
